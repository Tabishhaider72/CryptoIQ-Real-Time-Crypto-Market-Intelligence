services:
  app:
    build:
      context: .
      dockerfile: Dockerfile

    ports:
      - "3000:3000"
      - "4001:4001"

    env_file:
      - .env

    environment:
      - REDIS_URL=redis://redis:6379
      - NEXT_PUBLIC_SOCKET_URL=http://localhost:4001

    depends_on:
      redis:
        condition: service_healthy

    dns:
      - 8.8.8.8
      - 8.8.4.4

    restart: unless-stopped

  redis:
    image: redis:7-alpine

    ports:
      - "6379:6379"

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

    restart: unless-stopped$env:DOCKER_BUILDKIT=1